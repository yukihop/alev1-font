entries:
  - binary: "00000001"
    keywords:
      - of
    comment: 語順も英語のofと同じ。
  - binary: "00000011"
    keywords:
      - and
    comment: 「そして」「かつ」のような意味。動詞句と動詞句、名詞と名詞を連結できる。「～と共に (with)」という副詞句かもしれない用例もある。
  - binary: "00001000"
    keywords:
      - by
      - by-means-of
    comment: 「～することにより」「～のために」のような意味だと思われる。
  - binary: "00010001"
    keywords:
      - one
    comment: 数字の「1」。
  - binary: "01000000"
    keywords:
      - robot
    comment: 「ロボット」。
  - binary: "01000001"
    keywords:
      - i
      - alev1
      - me
      - myself
    comment: 「私」と「ALEV-1」の両方の意味。
  - binary: "01000010"
    keywords:
      - you
      - your
    comment: 「あなた」。
  - binary: "01001000"
    keywords:
      - human
    comment: 「人間」。
  - binary: "01001100"
    keywords:
      - straylight
    comment: 「ストレイライト」。
  - binary: "01001101"
    keywords:
      - fuyuko
      - fuyu
    comment: 「黛冬優子」「冬優子」「ふゆ」で同一表記。
  - binary: "01001110"
    keywords:
      - asahi
    comment: 「芹沢あさひ」とフルネームで呼ばれたことしかない。
  - binary: "01001111"
    keywords:
      - mei
    comment: 「和泉愛依」とフルネームで呼ばれたことしかない。
  - binary: "01100000"
    keywords:
      - they
    comment: 用例が少ないが「彼ら」のような指示代名詞のよう。
  - binary: "01100010"
    keywords:
      - it
      - this
    comment: 「これ」「それ」のような指示代名詞。「この」のように名詞を修飾も可能。
  - binary: "01110010"
    comment: 候補は「意図」「発言」「概念」「要求」あたり。かなり抽象的な名詞のよう。
  - binary: "01110101"
    keywords:
      - something
    comment: 「何か」。
  - binary: "10000001"
    keywords:
      - not
      - non
      - without
    comment: 直後の文字を否定する。コピュラと組み合わせて「ではない」、動詞や助動詞の前に置いて「～ない」。名詞の前に置かれて「非～」を表す用例もある。単独で「いいえ」を表す用例もある。
  - binary: "10000010"
    keywords:
      - can
      - able
    comment: 動詞に前置され「～できる」の意味を表す。
  - binary: "10000101"
    keywords:
      - prf
    comment: 「既に～した」「～済みです」のような完了アスペクトを表すと思われる。
  - binary: "10000110"
    keywords:
      - will
    comment: 動詞に前置され「～するつもりだ」のような意志を表す。
  - binary: "10001010"
    keywords:
      - interrogative
      - vocative
    comment: 聞き手への問いかけを表す文字。文頭に置き「～なのか？」に対応する疑問文を形成する。あるいは単独で「え？ どういうこと？」のような意味。「～さん」のような呼びかけらしき用例もある。
  - binary: "10100000"
    keywords:
      - do
      - run
      - execute
      - cause
      - let
    comment: 「実行する」の訳が充てられている2文字のうちの1つ。最初期から "RUN" として発表されている文字。だだし明示的に訳出されないこともあり、その見た目からも「する」「やる」程度の弱い意味しかないのかもしれない。一方で他の動詞に前置して使役表現 ("let/make") として使われている形跡もある。
  - binary: "10100001"
    keywords:
      - be
      - am
      - is
      - are
      - exist
    comment: いわゆるコピュラ（be動詞）、つまり「だ・です」。省略されることも多く、その場合やや強調的・感情的文になる傾向がある。英語と同様に "exist" の意味もある（EDロールで明示）。
  - binary: "10100010"
    keywords:
      - learn
    comment: 「学習する」。
  - binary: "10100101"
    keywords:
      - receive
      - accept
    comment: 「（要求を）受領する」と「（愛を）受け取る」の2用例。
  - binary: "10100110"
    keywords:
      - respond
      - tell
    comment: 「回答する」あるいは「答えを教える」。目的語の部位には伝える相手が来る用例と、何に対する答えなのかが来る用例の両方がある。
  - binary: "10100111"
    keywords:
      - reach
    comment: 「到達する」。
  - binary: "10101000"
    keywords:
      - feel
      - emote
    comment: ":emotion: (=感情) に対応する動詞なので「感じる」「感動する」「感情を表現する」のような意味だと推測される。"
  - binary: "10101001"
    keywords:
      - know
    comment: 「知る」。
  - binary: "10101010"
    keywords:
      - perform
    comment: '第1公演で初出の、「実行する」の訳が充てられている2文字のうちの1つ。:performance: (= "performance") に対応しているので、単に「行う」ことではなく「パフォーマンスする」という明確な意味を持つよう。冬優子との対話でニュアンスの使い分けを見て取れる。'
  - binary: "10101011"
    keywords:
      - seek
      - wanna
    comment: 「～を求める」という単純な他動詞用法と、他の動詞に前置して「～したい」を表す補助動詞的用法がある。
  - binary: "10101110"
    keywords:
      - prove
    comment: 「証明する」。
  - binary: "10110001"
    keywords:
      - become
    comment: 「～になる」。
  - binary: "10110010"
    keywords:
      - control
    comment: 「制御する」。
  - binary: "10110101"
    keywords:
      - hold
      - possess
    comment: ':life: (= "life") や :emotion: (= "emotion") の直前に置かれる動詞。文脈から "holding" あるいは "possessing" のような意味に見える。'
  - binary: "10110110"
    keywords:
      - require
    comment: 「必要とする」。
  - binary: "10111010"
    keywords:
      - share
    comment: 「共有する」。
  - binary: "10111100"
    keywords:
      - detect
    comment: 「検知する」。
  - binary: "10111101"
    keywords:
      - visualize
    comment: 「視覚化する」。
  - binary: "10111110"
    keywords:
      - infer
    comment: 「推論する」。
  - binary: "11000001"
    keywords:
      - full-of
      - existence
    comment: 名詞としての「存在」のほか、名詞に前置して「～が豊富な・～だくさん (-ful, -rich)」のような意味を帯びさせる働きがあるよう。
  - binary: "11000100"
    keywords:
      - mortality
      - death
    comment: ':not: (= "not") と組み合わさって「永遠」を表す名詞。つまり単体では「変化の必然性」「終焉」「死」のような意味が考えられる。'
  - binary: "11001000"
    keywords:
      - emotion
    comment: 「感情」。ポッドがゲージを溜める間表示されていたもの。
  - binary: "11001010"
    keywords:
      - performance
    comment: 「パフォーマンス」。
  - binary: "11001100"
    keywords:
      - love
    comment: 「愛」。名詞としての「愛」の用法のみ。恐らく「愛する」の文字は動詞として別に存在する。
  - binary: "11001101"
    keywords:
      - live
      - life
      - alive
    comment: 「ライブ」「生命」の両方の意味で使用。Aliveの意味はエンディングロールで明示。
  - binary: "11001110"
    keywords:
      - proof
    comment: 「証明」。
  - binary: "11001111"
    keywords:
      - error
      - noise
    comment: 「誤り」「ノイズ」の両方の用例あり。
  - binary: "11010000"
    keywords:
      - perfection
      - perfect
    comment: 「完璧な」あるいは「完璧さ」。
  - binary: "11010100"
    keywords:
      - meaning
    comment: 「意味」。恐らく "mean/signify" の意味を持つ動詞に対応している。
  - binary: "11101011"
    keywords:
      - word
    comment: 「言葉」。
  - binary: "11110000"
    keywords:
      - wanchan
      - tofu
    comment: 「ワンちゃん」のこと。唯一、ある意味で表音文字的に使われているかもしれない例。あるいは単に未定義語を仮に表すプレースホルダーかもしれない。
  - binary: "11111100"
    keywords:
      - singularity
    comment: 「シンギュラリティー」。
